<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>接大脑小游戏</title>
    <style>
      :root {
        --stage-width: min(100vw, 640px);
        --stage-height: calc(var(--stage-width) * 1030 / 640);
        --ui-blue: #47d9ff;
        --ui-deep: #14316f;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top, rgba(165, 239, 245, 0.75), transparent 26%),
          linear-gradient(180deg, #effbff 0%, #edf7ff 48%, #f8fbff 100%);
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      .game {
        position: relative;
        width: var(--stage-width);
        height: var(--stage-height);
        overflow: hidden;
        background: url("./catch-bg.jpg") center / cover no-repeat;
        box-shadow: 0 28px 80px rgba(37, 89, 139, 0.18);
        user-select: none;
        touch-action: none;
      }

      .game::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.28), transparent 18%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 16%, transparent 84%, rgba(255, 255, 255, 0.08));
        pointer-events: none;
      }

      .hud {
        position: absolute;
        top: 18px;
        left: 18px;
        right: 18px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        z-index: 5;
      }

      .pill {
        min-width: 124px;
        padding: 10px 16px;
        border-radius: 999px;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.4px;
        background:
          linear-gradient(180deg, rgba(123, 233, 255, 0.7), rgba(35, 81, 157, 0) 26%),
          linear-gradient(180deg, #2e68bf 0%, #173a82 100%);
        box-shadow:
          0 8px 20px rgba(20, 49, 111, 0.24),
          inset 0 0 0 1px rgba(181, 241, 255, 0.4);
      }

      .goal {
        position: absolute;
        top: 78px;
        left: 50%;
        transform: translateX(-50%);
        padding: 11px 18px;
        border-radius: 999px;
        color: #2f5ca8;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.6px;
        font-family: "STYuanti-SC-Bold", "Hannotate SC", "Comic Sans MS", "PingFang SC", sans-serif;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.82);
        box-shadow:
          0 10px 28px rgba(66, 111, 175, 0.15),
          inset 0 0 0 1px rgba(160, 233, 255, 0.36);
        z-index: 5;
        backdrop-filter: blur(10px);
        white-space: nowrap;
      }

      .catcher {
        position: absolute;
        bottom: 30px;
        left: 50%;
        width: 32%;
        min-width: 160px;
        max-width: 220px;
        transform: translateX(-50%);
        filter: drop-shadow(0 14px 18px rgba(49, 88, 148, 0.22));
        z-index: 4;
        pointer-events: none;
        transition: filter 180ms ease, transform 180ms ease;
      }

      .catcher.caught {
        filter:
          drop-shadow(0 14px 18px rgba(49, 88, 148, 0.22))
          drop-shadow(0 0 26px rgba(116, 245, 255, 0.95))
          drop-shadow(0 0 46px rgba(124, 227, 255, 0.72));
        transform: translateX(-50%) scale(1.05);
      }

      .falling-item {
        position: absolute;
        top: -64px;
        width: 124px;
        height: 108px;
        transform: translate(-50%, 0);
        filter: drop-shadow(0 8px 10px rgba(47, 137, 215, 0.15));
        z-index: 3;
        will-change: transform, top;
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
      }

      .falling-item.caught {
        filter:
          drop-shadow(0 8px 10px rgba(47, 137, 215, 0.15))
          drop-shadow(0 0 20px rgba(132, 255, 219, 0.92))
          drop-shadow(0 0 42px rgba(112, 223, 255, 0.82));
      }

      .falling-item.glow::after {
        content: "";
        position: absolute;
        inset: 4%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(155, 255, 226, 0.42), transparent 68%);
        z-index: -1;
        animation: itemPulse 1.1s ease-in-out infinite;
      }

      .falling-item.caught::after {
        background: radial-gradient(circle, rgba(162, 255, 231, 0.9), transparent 66%);
        animation: catchPulse 420ms ease-out forwards;
      }

      .flash {
        position: absolute;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(125, 246, 255, 0.44), transparent 70%);
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: burst 380ms ease-out forwards;
        z-index: 6;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(11, 25, 62, 0.46);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
        z-index: 10;
      }

      .overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .dialog {
        width: min(86%, 380px);
        padding: 28px 24px 26px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.94);
        text-align: center;
        box-shadow: 0 24px 60px rgba(17, 41, 98, 0.24);
        backdrop-filter: blur(12px);
      }

      .dialog h2 {
        margin: 0 0 8px;
        font-size: 58px;
        line-height: 1;
        letter-spacing: 4px;
        font-weight: 900;
        font-family: "STYuanti-SC-Bold", "Hannotate SC", "Comic Sans MS", "PingFang SC", sans-serif;
        text-shadow:
          0 3px 0 rgba(255, 255, 255, 0.92),
          0 10px 18px rgba(59, 101, 175, 0.2);
      }

      .dialog p {
        margin: 0 0 18px;
        color: #49608f;
        font-size: 15px;
        line-height: 1.6;
      }

      .dialog.success h2 {
        color: #2a61b3;
      }

      .dialog.fail h2 {
        color: #6b78a6;
      }

      .restart {
        border: 0;
        border-radius: 999px;
        padding: 14px 28px;
        color: #fff;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 1px;
        cursor: pointer;
        background:
          linear-gradient(180deg, rgba(116, 228, 255, 0.7), rgba(33, 85, 165, 0) 24%),
          linear-gradient(180deg, #2f69c1 0%, #183c86 100%);
        box-shadow:
          0 12px 24px rgba(20, 49, 111, 0.26),
          inset 0 0 0 1px rgba(181, 241, 255, 0.44);
      }

      .dialog.success .restart {
        padding: 11px 22px;
        font-size: 16px;
      }

      .dialog.fail .restart {
        padding: 16px 36px;
        font-size: 22px;
      }

      .tip {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        color: rgba(21, 52, 101, 0.78);
        font-size: 13px;
        background: rgba(255, 255, 255, 0.66);
        z-index: 5;
      }

      @keyframes itemPulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.9);
        }
        50% {
          opacity: 0.62;
          transform: scale(1.06);
        }
      }

      @keyframes burst {
        0% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(0.5);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.4);
        }
      }

      @keyframes catchPulse {
        0% {
          opacity: 1;
          transform: scale(0.8);
        }
        100% {
          opacity: 0;
          transform: scale(1.45);
        }
      }
    </style>
  </head>
  <body>
    <main class="game" id="game" aria-label="接大脑小游戏">
      <div class="hud">
        <div class="pill" id="scoreLabel">得分：0</div>
        <div class="pill" id="timeLabel">倒计时：10</div>
      </div>

      <div class="goal">拖动底部人物接住 5 个智能大脑即可通关</div>

      <img class="catcher" id="catcher" src="./catcher.png" alt="阿里云角色" />

      <div class="overlay" id="overlay" aria-live="polite">
        <section class="dialog">
          <h2 id="resultTitle">开始游戏</h2>
          <p id="resultText">10 秒内接满 5 个智能大脑，每接到 1 个加 5 分。</p>
          <button class="restart" id="restartButton" type="button">重新开始</button>
        </section>
      </div>

      <div class="tip">按住人物左右拖动即可接取大脑</div>
    </main>

    <script>
      const game = document.getElementById("game");
      const catcher = document.getElementById("catcher");
      const scoreLabel = document.getElementById("scoreLabel");
      const timeLabel = document.getElementById("timeLabel");
      const overlay = document.getElementById("overlay");
      const dialog = overlay.querySelector(".dialog");
      const resultTitle = document.getElementById("resultTitle");
      const resultText = document.getElementById("resultText");
      const restartButton = document.getElementById("restartButton");
      const brainAssets = [
        "./brain-1.png",
        "./brain-2.png",
        "./brain-3.png",
        "./brain-4.png",
        "./brain-5.png",
      ];

      let score = 0;
      let caughtCount = 0;
      let timeLeft = 10;
      let playing = false;
      let timerId = null;
      let spawnId = null;
      let animationId = null;
      let pointerActive = false;
      let catcherCenter = 0;
      const fallingItems = [];

      function gameRect() {
        return game.getBoundingClientRect();
      }

      function resetCatcher() {
        catcherCenter = gameRect().width / 2;
        syncCatcher();
      }

      function syncCatcher() {
        const rect = gameRect();
        const catcherWidth = catcher.getBoundingClientRect().width || rect.width * 0.22;
        const minX = catcherWidth / 2;
        const maxX = rect.width - catcherWidth / 2;
        catcherCenter = Math.max(minX, Math.min(maxX, catcherCenter));
        catcher.style.left = `${catcherCenter}px`;
      }

      function updateHud() {
        scoreLabel.textContent = `得分：${score}`;
        timeLabel.textContent = `倒计时：${timeLeft}`;
      }

      function showOverlay(title, text, buttonText, mode) {
        resultTitle.textContent = title;
        resultText.textContent = text;
        restartButton.textContent = buttonText;
        dialog.classList.remove("success", "fail");
        dialog.classList.add(mode);
        overlay.classList.add("show");
      }

      function hideOverlay() {
        overlay.classList.remove("show");
      }

      function clearItems() {
        fallingItems.splice(0).forEach((item) => item.el.remove());
      }

      function spawnFlash(x, y) {
        const flash = document.createElement("div");
        flash.className = "flash";
        flash.style.left = `${x}px`;
        flash.style.top = `${y}px`;
        game.appendChild(flash);
        window.setTimeout(() => flash.remove(), 380);
      }

      function spawnItem() {
        if (!playing) return;
        const rect = gameRect();
        const item = document.createElement("div");
        item.className = "falling-item glow brain-item";
        item.style.backgroundImage = `url("${brainAssets[Math.floor(Math.random() * brainAssets.length)]}")`;
        const x = 60 + Math.random() * (rect.width - 120);
        const speed = 2.7 + Math.random() * 1.8;
        item.style.left = `${x}px`;
        game.appendChild(item);
        fallingItems.push({
          el: item,
          x,
          y: -64,
          speed,
          wobble: Math.random() * Math.PI * 2,
          width: 124,
          height: 108,
        });
      }

      function endGame() {
        playing = false;
        window.clearInterval(timerId);
        window.clearInterval(spawnId);
        cancelAnimationFrame(animationId);

        const passed = caughtCount >= 5;
        if (passed) {
          showOverlay("成功", `接到 ${caughtCount} 个脑子，获得 ${score} 分`, "再来一次", "success");
        } else {
          showOverlay("失败", `本次接到 ${caughtCount} 个脑子，获得 ${score} 分`, "再来一次", "fail");
        }
      }

      function tick() {
        if (!playing) return;
        const rect = gameRect();
        const catcherRect = catcher.getBoundingClientRect();
        const catcherLeft = catcherCenter - catcherRect.width / 2;
        const catcherTop = rect.height - catcherRect.height - 30;
        const catcherBottom = catcherTop + catcherRect.height * 0.92;

        for (let i = fallingItems.length - 1; i >= 0; i -= 1) {
          const item = fallingItems[i];
          item.y += item.speed;
          const drift = Math.sin(item.y / 28 + item.wobble) * 6;
          item.el.style.top = `${item.y}px`;
          item.el.style.left = `${item.x + drift}px`;

          const itemX = item.x + drift;
          const itemY = item.y + item.height / 2;

          const hitX = itemX > catcherLeft + 10 && itemX < catcherLeft + catcherRect.width - 10;
          const hitY = itemY > catcherTop + 12 && itemY < catcherBottom;

          if (hitX && hitY) {
            score += 5;
            caughtCount += 1;
            updateHud();
            catcher.classList.add("caught");
            item.el.classList.add("caught");
            spawnFlash(itemX, itemY);
            window.setTimeout(() => catcher.classList.remove("caught"), 260);
            window.setTimeout(() => {
              item.el.remove();
            }, 220);
            fallingItems.splice(i, 1);
            continue;
          }

          if (item.y > rect.height + 60) {
            item.el.remove();
            fallingItems.splice(i, 1);
          }
        }

        animationId = requestAnimationFrame(tick);
      }

      function startGame() {
        score = 0;
        caughtCount = 0;
        timeLeft = 10;
        playing = true;
        clearItems();
        updateHud();
        hideOverlay();
        resetCatcher();

        spawnItem();
        tick();

        spawnId = window.setInterval(() => {
          spawnItem();
        }, 640);

        timerId = window.setInterval(() => {
          timeLeft -= 1;
          updateHud();
          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      function moveCatcher(clientX) {
        const rect = gameRect();
        catcherCenter = clientX - rect.left;
        syncCatcher();
      }

      game.addEventListener("pointerdown", (event) => {
        if (!playing) return;
        pointerActive = true;
        moveCatcher(event.clientX);
      });

      window.addEventListener("pointermove", (event) => {
        if (!playing || !pointerActive) return;
        moveCatcher(event.clientX);
      });

      window.addEventListener("pointerup", () => {
        pointerActive = false;
      });

      window.addEventListener("resize", () => {
        if (!playing) {
          resetCatcher();
          return;
        }
        syncCatcher();
      });

      restartButton.addEventListener("click", () => {
        startGame();
      });

      resetCatcher();
      updateHud();
      startGame();
    </script>
  </body>
</html>
